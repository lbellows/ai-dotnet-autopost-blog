name: Daily AI Blog Post

on:
  schedule:
    - cron: "15 11 * * *"   # 11:15 UTC daily (~07:15 ET)
  workflow_dispatch:
    inputs:
      ai_provider:
        description: "AI provider to use"
        required: false
        default: "anthropic"
        type: choice
        options:
          - anthropic
          - foundry

permissions:
  contents: write

jobs:
  write-post:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Validate provider secrets
        env:
          PROVIDER: ${{ inputs.ai_provider || 'foundry' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FOUNDRY_OPENAI_ENDPOINT: ${{ secrets.FOUNDRY_OPENAI_ENDPOINT }}
          FOUNDRY_PROJECT_API_KEY: ${{ secrets.FOUNDRY_PROJECT_API_KEY }}
        run: |
          case "$PROVIDER" in
            anthropic|claude)
              [ -n "$ANTHROPIC_API_KEY" ] || { echo "::error::Missing ANTHROPIC_API_KEY secret."; exit 1; }
              ;;
            foundry|azure)
              [ -n "$FOUNDRY_OPENAI_ENDPOINT" ] || { echo "::error::Missing FOUNDRY_OPENAI_ENDPOINT secret."; exit 1; }
              [ -n "$FOUNDRY_PROJECT_API_KEY" ] || { echo "::error::Missing FOUNDRY_PROJECT_API_KEY secret."; exit 1; }
              ;;
            *)
              echo "::error::Unknown provider: $PROVIDER"; exit 1
              ;;
          esac

      - name: Generate grounded article via Web Search
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FOUNDRY_OPENAI_ENDPOINT: ${{ secrets.FOUNDRY_OPENAI_ENDPOINT }}
          FOUNDRY_PROJECT_API_KEY: ${{ secrets.FOUNDRY_PROJECT_API_KEY }}
          IMGFLIP_USERNAME: ${{ secrets.IMGFLIP_USERNAME }}
          IMGFLIP_PASSWORD: ${{ secrets.IMGFLIP_PASSWORD }}
        run: |
          dotnet --version | grep -q "^10\." || { echo "::error::.NET 10 not found on runner."; exit 1; }
          dotnet run --project BlogGenerator -- ${{ inputs.ai_provider || 'foundry' }}

      - name: Commit & push if changed
        run: |
          git config user.name  "the.serf"
          git config user.email "the.serf@users.noreply.github.com"
          if [ -n "$(git status --porcelain)" ]; then
            git add _posts
            git commit -m "chore(posts): daily AI article (web search)"
            git push
          else
            echo "No changes to commit."
          fi
